<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ByteXL Assistant</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <h2>⚡ ByteXL Assistant</h2>
    <button id="resetBtn" class="reset-btn" title="Reset chat">↻</button>
  </div>

  <div class="chat-box" id="chatBox"></div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder='Try: "do all questions"' />
    <button id="sendBtn">Send</button>
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
